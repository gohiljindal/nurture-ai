name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  next-api:
    name: Next.js API (lint, typecheck, prisma)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Prisma validate schema
        env:
          DATABASE_URL: postgresql://nurture:nurture_dev_local@localhost:5432/nurtureai?schema=public&connect_timeout=15
          DIRECT_URL: postgresql://nurture:nurture_dev_local@localhost:5432/nurtureai?schema=public&connect_timeout=15
        run: npx prisma validate

      - name: npm audit (advisory)
        continue-on-error: true
        run: npm audit --audit-level=moderate

  mobile:
    name: Expo mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: npm audit (advisory)
        continue-on-error: true
        run: npm audit --audit-level=moderate
